<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viabo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/Home.css">
</head>
<body>
    <header class="siteHeader">
        <div class="headerInner">
            <a class="brand" href="#home" aria-label="Ir al inicio">
                <img class="brandLogo" src="/assets/imagenes/Logo.png" alt="Viabo">
            </a>

            <button class="menuButton" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="site-navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="siteNav" id="site-navigation" aria-label="Navegación principal">
                <ul>
                    <li><a href="#home" data-route="home" class="active">Inicio</a></li>
                    <li><a href="#catalog" data-route="catalog">Catálogo</a></li>
                    <li><a href="#about" data-route="about">Nosotros</a></li>
                    <li><a href="#">Contacto</a></li>
                </ul>
            </nav>

            <a class="cartButton" href="#" aria-label="Ir al carrito">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M3 4h2l2.2 9.3a1 1 0 0 0 1 .7h8.8a1 1 0 0 0 1-.8L20 7H7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="10" cy="19" r="1.6" fill="currentColor"/>
                    <circle cx="17" cy="19" r="1.6" fill="currentColor"/>
                </svg>
            </a>
        </div>

        <div class="headerBackdrop" hidden></div>
    </header>

    <main id="app-home"></main>

    <!-- Footer principal del sitio -->
    <footer class="siteFooter">
        <div class="siteFooterContainer">
            <!-- Distribucion en columnas del footer -->
            <div class="siteFooterGrid">
                <!-- Bloque de marca y descripcion -->
                <div class="siteFooterBrand">
                    <a href="#home" aria-label="Ir al inicio" class="siteFooterBrandLink">
                        <img src="/assets/imagenes/Logo.png" alt="Viabo" class="siteFooterBrandLogo">
                    </a>
                    <p class="siteFooterBrandText">
                        Experiencias autenticas que conectan viajeros con el alma de Bogota.
                    </p>
                </div>

                <!-- Enlaces de navegacion: Explora -->
                <div class="siteFooterCol">
                    <h3 class="siteFooterHeading">Explora</h3>
                    <ul class="siteFooterList">
                        <li><a href="#" class="siteFooterLink">Tours Privados</a></li>
                        <li><a href="#" class="siteFooterLink">Corporativos</a></li>
                        <li><a href="#" class="siteFooterLink">Regalos</a></li>
                    </ul>
                </div>

                <!-- Enlaces de navegacion: Compañia -->
                <div class="siteFooterCol">
                    <h3 class="siteFooterHeading">Compañia</h3>
                    <ul class="siteFooterList">
                        <li><a href="#" class="siteFooterLink">Privacidad</a></li>
                        <li><a href="#" class="siteFooterLink">Terminos</a></li>
                        <li><a href="#" class="siteFooterLink">Preguntas Frecuentes</a></li>
                        <li><a href="#" class="siteFooterLink">Soporte</a></li>
                    </ul>
                </div>

                <!-- Bloque de redes y compartido -->
                <div class="siteFooterCol">
                    <h3 class="siteFooterHeading">Siguenos</h3>
                    <div class="siteFooterSocials">
                        <!-- Icono de WhatsApp -->
                        <a href="#" aria-label="WhatsApp" class="siteFooterSocialLink">
                            <svg viewBox="0 0 24 24" class="siteFooterSocialIcon" focusable="false">
                                <path d="M12 2.2A9.8 9.8 0 0 0 3.6 17l-1.2 4.8 4.9-1.3A9.8 9.8 0 1 0 12 2.2Zm0 17.9c-1.4 0-2.7-.4-3.8-1.1l-.3-.2-2.9.8.8-2.8-.2-.3a8 8 0 1 1 6.4 3.6Zm4.4-5.7c-.2-.1-1.3-.7-1.5-.8-.2-.1-.4-.1-.5.1l-.7.8c-.1.2-.3.2-.5.1-.2-.1-.9-.3-1.7-1-.6-.5-1-1.1-1.1-1.3-.1-.2 0-.3.1-.4l.4-.5.2-.4c.1-.1 0-.3 0-.4l-.7-1.7c-.2-.4-.4-.3-.5-.3h-.4c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 1.9s.8 2.2.9 2.3c.1.2 1.6 2.5 3.9 3.5.5.2.9.4 1.2.5.5.1 1 .1 1.4.1.4-.1 1.3-.5 1.5-.9.2-.4.2-.8.1-.9Z" />
                            </svg>
                        </a>
                        <!-- Icono de sitio web -->
                        <a href="#" aria-label="Sitio web" class="siteFooterSocialLink">
                            <svg viewBox="0 0 24 24" class="siteFooterSocialIcon" focusable="false">
                                <path d="M12 2.2a9.8 9.8 0 1 0 0 19.6 9.8 9.8 0 0 0 0-19.6Zm6.9 8h-3a15.7 15.7 0 0 0-1.4-5 8 8 0 0 1 4.4 5Zm-6.9-5.5c.7.9 1.6 2.9 2 5.5h-4c.4-2.6 1.2-4.6 2-5.5ZM5.1 13.8h3a15 15 0 0 0 1.4 5 8 8 0 0 1-4.4-5Zm3-3.6h-3a8 8 0 0 1 4.4-5 15 15 0 0 0-1.4 5Zm3.9 9.1c-.7-.9-1.6-2.9-2-5.5h4c-.4 2.6-1.2 4.6-2 5.5Zm2.4-.5a15 15 0 0 0 1.4-5h3a8 8 0 0 1-4.4 5Z" />
                            </svg>
                        </a>
                        <!-- Icono para compartir -->
                        <a href="#" aria-label="Compartir" class="siteFooterSocialLink">
                            <svg viewBox="0 0 24 24" class="siteFooterSocialIcon" focusable="false">
                                <path d="M18 16.1a2.9 2.9 0 0 0-2.4 1.3l-6.2-3.1a2.9 2.9 0 0 0 0-1.6l6.2-3A3 3 0 1 0 15 8.2l-6.3 3a3 3 0 1 0 0 4.8l6.3 3c0 .3-.1.5-.1.8a3 3 0 1 0 3-3Z" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Linea divisoria inferior del footer -->
            <div class="siteFooterDivider"></div>
        </div>
    </footer>

    <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
